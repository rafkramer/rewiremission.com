<html lang="en">
<head>

  <script>document.documentElement.classList.add('js');</script>
  <style>
    :root {
      --bg: #13223F;
      --ink-bright: #F2F1EF;
      --ink-muted: rgba(235, 235, 235, 0.60);
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'Hanken Grotesk', -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: rgba(235, 235, 235, 0.68);
      font-family: var(--sans);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    ::selection { background: rgba(134, 216, 223, 0.20); color: #fff; }

    /* drifting pools of light */
    .drift {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    .drift i {
      position: absolute;
      display: block;
      border-radius: 50%;
      filter: blur(48px);
    }

    .drift .a {
      width: 72vmax; height: 56vmax;
      left: -20%; top: -24%;
      background: radial-gradient(50% 50% at 50% 50%, rgba(70, 90, 135, 0.45), transparent 70%);
      animation: driftA 55s ease-in-out infinite alternate;
    }

    .drift .b {
      width: 62vmax; height: 50vmax;
      right: -20%; bottom: -22%;
      background: radial-gradient(50% 50% at 50% 50%, rgba(58, 72, 112, 0.40), transparent 70%);
      animation: driftB 70s ease-in-out infinite alternate;
    }

    .drift .c {
      width: 40vmax; height: 32vmax;
      left: 2%; bottom: -14%;
      background: radial-gradient(50% 50% at 50% 50%, rgba(48, 116, 128, 0.30), transparent 70%);
      animation: driftC 45s ease-in-out infinite alternate;
    }

    .drift .d {
      width: 34vmax; height: 28vmax;
      right: 2%; top: -12%;
      background: radial-gradient(50% 50% at 50% 50%, rgba(134, 216, 223, 0.10), transparent 70%);
      animation: driftD 60s ease-in-out infinite alternate;
    }

    @keyframes driftA { to { transform: translate(9%, 12%) scale(1.18); } }
    @keyframes driftB { to { transform: translate(-10%, -10%) scale(1.12); } }
    @keyframes driftC { to { transform: translate(13%, -12%) scale(1.2); } }
    @keyframes driftD { to { transform: translate(-12%, 14%) scale(1.15); } }

    /* the breathing halo */
    .halo {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 74vmin;
      height: 74vmin;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: -1;
    }

    .halo .core {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%,
          rgba(134, 216, 223, 0.075) 0%,
          rgba(90, 84, 175, 0.13) 26%,
          rgba(42, 30, 92, 0.16) 46%,
          rgba(25, 22, 69, 0.10) 62%,
          transparent 74%);
      filter: blur(26px);
      animation: breathe 7.5s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.82; }
      50% { transform: scale(1.05); opacity: 1; }
    }

    /* film grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.028'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    .corner {
      position: fixed;
      top: 1.9rem;
      z-index: 60;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      text-decoration: none;
      color: rgba(235, 235, 235, 0.55);
      transition: color 0.4s ease;
    }
    .corner:hover { color: var(--ink-bright); }
    .corner.brand { left: clamp(1.5rem, 5vw, 3rem); color: rgba(235, 235, 235, 0.68); }
    .corner.contact { right: clamp(1.5rem, 5vw, 3rem); }

    a:focus-visible { outline: 1px solid rgba(235, 235, 235, 0.42); outline-offset: 5px; }

    .page {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 6rem clamp(1.5rem, 7vw, 5rem) 4rem;
    }

    /* the collab banner - a quiet little pill */
    .banner {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.4rem 0.85rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      margin-bottom: 2.4rem;
    }

    .banner .tile {
      display: block;
      width: 24px;
      height: 24px;
      border-radius: 7px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .banner .tile img { display: block; width: 100%; height: 100%; object-fit: cover; }

    .banner .times {
      font-family: var(--sans);
      font-weight: 300;
      font-size: 0.72rem;
      color: rgba(235, 235, 235, 0.42);
    }

    h1 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(2.6rem, 7vw, 5rem);
      line-height: 1.1;
      letter-spacing: -0.012em;
      color: var(--ink-bright);
      text-wrap: balance;
    }

    h1 em {
      font-style: italic;
      background: linear-gradient(105deg, #EDEBF7 10%, #C7D0F4 50%, #9FB3ED 90%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .sub {
      margin-top: 1.7rem;
      font-size: clamp(1rem, 1.4vw, 1.12rem);
      line-height: 1.75;
      color: var(--ink-muted);
      max-width: 24em;
      text-wrap: balance;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 3.2rem;
    }

    .store {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      background: #ECEBE9;
      color: #0D0D0D;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      padding: 1.15rem 2.8rem;
      border-radius: 999px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5), 0 0 60px rgba(150, 170, 240, 0.12);
      transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.4s ease;
    }
    .store:hover {
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 16px 44px rgba(0, 0, 0, 0.55), 0 0 80px rgba(150, 170, 240, 0.18);
    }
    .store:active { transform: scale(0.985); }

    .store svg { width: 1.05em; height: 1.05em; display: block; margin-top: -2px; }

    /* the Android button - same shape, but waiting its turn */
    .store.android-btn {
      background: transparent;
      color: rgba(235, 235, 235, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: none;
      cursor: default;
    }
    .store.android-btn:hover {
      background: transparent;
      transform: none;
      box-shadow: none;
    }
    .store.android-btn svg { opacity: 0.55; }

    footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: max(1.1rem, env(safe-area-inset-bottom));
      text-align: center;
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: rgba(235, 235, 235, 0.28);
    }
    footer a {
      color: inherit;
      text-decoration: none;
      transition: color 0.3s ease;
    }
    footer a:hover { color: rgba(235, 235, 235, 0.6); }
    footer .sep { margin: 0 0.55em; }

    /* soft entrance */
    .js .rise {
      opacity: 0;
      transform: translateY(20px);
      filter: blur(8px);
      transition:
        opacity 1.3s ease,
        transform 1.3s cubic-bezier(0.2, 0.7, 0.2, 1),
        filter 1.3s ease;
    }
    .js .rise.d1 { transition-delay: 0.18s; }
    .js .rise.d2 { transition-delay: 0.36s; }
    .js .rise.d3 { transition-delay: 0.54s; }
    .js .in .rise { opacity: 1; transform: none; filter: blur(0); }

    @media (max-width: 640px) {
      .halo { width: 96vmin; height: 96vmin; }
      .drift i { filter: blur(34px); }
      .corner { top: 1.5rem; }
      .cta-row { flex-direction: column; }
      .banner { margin-bottom: 2rem; }
      .sub { font-size: 0.99rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .drift i, .halo .core { animation: none; }
      .js .rise { opacity: 1; transform: none; filter: none; transition: none; }
    }
  </style>
</head>

    setTimeout(() => document.querySelector('.page').classList.add('in'), 160);

</body>
