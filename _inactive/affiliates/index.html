<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Rewire Affiliates</title>
  <meta name="description" content="The Rewire affiliate program. Invite only.">
  <meta name="theme-color" content="#13223F">
  <meta property="og:title" content="Rewire Affiliates">
  <meta property="og:description" content="Invite only.">
  <meta property="og:url" content="https://rewiremission.com/affiliates/">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://rewiremission.com/affiliates/">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2313223F'/%3E%3Ccircle cx='32' cy='32' r='14' fill='%232A1E5C'/%3E%3Ccircle cx='32' cy='32' r='14' fill='none' stroke='%2386D8DF' stroke-opacity='0.6' stroke-width='1.5'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <script>document.documentElement.classList.add('js');</script>
  <style>
    :root {
      --bg: #13223F;
      --ink-bright: #F2F1EF;
      --ink-muted: rgba(235, 235, 235, 0.60);
      --ink-faint: rgba(235, 235, 235, 0.42);
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'Hanken Grotesk', -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--ink-muted);
      font-family: var(--sans);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    ::selection { background: rgba(134, 216, 223, 0.20); color: #fff; }

    /* drifting pools of light */
    .drift { position: fixed; inset: 0; pointer-events: none; z-index: -1; }
    .drift i { position: absolute; display: block; border-radius: 50%; filter: blur(48px); }
    .drift .a {
      width: 72vmax; height: 56vmax; left: -20%; top: -24%;
      background: radial-gradient(50% 50% at 50% 50%, rgba(70, 90, 135, 0.45), transparent 70%);
      animation: driftA 55s ease-in-out infinite alternate;
    }
    .drift .b {
      width: 62vmax; height: 50vmax; right: -20%; bottom: -22%;
      background: radial-gradient(50% 50% at 50% 50%, rgba(58, 72, 112, 0.40), transparent 70%);
      animation: driftB 70s ease-in-out infinite alternate;
    }
    .drift .c {
      width: 40vmax; height: 32vmax; left: 2%; bottom: -14%;
      background: radial-gradient(50% 50% at 50% 50%, rgba(48, 116, 128, 0.30), transparent 70%);
      animation: driftC 45s ease-in-out infinite alternate;
    }
    @keyframes driftA { to { transform: translate(9%, 12%) scale(1.18); } }
    @keyframes driftB { to { transform: translate(-10%, -10%) scale(1.12); } }
    @keyframes driftC { to { transform: translate(13%, -12%) scale(1.2); } }

    /* the breathing halo */
    .halo {
      position: fixed;
      top: 50%; left: 50%;
      width: 74vmin; height: 74vmin;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: -1;
    }
    .halo .core {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%,
          rgba(134, 216, 223, 0.075) 0%,
          rgba(90, 84, 175, 0.13) 26%,
          rgba(42, 30, 92, 0.16) 46%,
          rgba(25, 22, 69, 0.10) 62%,
          transparent 74%);
      filter: blur(26px);
      animation: breathe 7.5s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.82; }
      50% { transform: scale(1.05); opacity: 1; }
    }

    /* film grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.028'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    .corner {
      position: fixed;
      top: 1.9rem;
      z-index: 60;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      text-decoration: none;
      color: rgba(235, 235, 235, 0.55);
      transition: color 0.4s ease;
    }
    .corner:hover { color: var(--ink-bright); }
    .corner.brand { left: clamp(1.5rem, 5vw, 3rem); color: rgba(235, 235, 235, 0.68); }
    .corner.contact { right: clamp(1.5rem, 5vw, 3rem); }

    a:focus-visible { outline: 1px solid var(--ink-faint); outline-offset: 5px; }

    .page {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 6rem clamp(1.5rem, 7vw, 5rem) 4rem;
    }

    .eyebrow {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.44em;
      text-indent: 0.44em;
      text-transform: uppercase;
      color: rgba(134, 216, 223, 0.55);
      margin-bottom: 2.4rem;
    }

    h1 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(2.8rem, 8vw, 5.6rem);
      line-height: 1.08;
      letter-spacing: -0.012em;
      color: var(--ink-bright);
      text-wrap: balance;
    }

    h1 em {
      font-style: italic;
      background: linear-gradient(105deg, #EDEBF7 10%, #C7D0F4 50%, #9FB3ED 90%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .sub {
      margin-top: 1.7rem;
      font-size: min(1.08rem, 4vw);
      line-height: 1.8;
      color: var(--ink-muted);
    }
    .sub span { display: block; }
    @media (min-width: 641px) { .sub span { white-space: nowrap; } }

    .pill-btn {
      display: inline-flex;
      align-items: center;
      margin-top: 3.2rem;
      background: #ECEBE9;
      color: #0D0D0D;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      padding: 1.15rem 2.8rem;
      border-radius: 999px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5), 0 0 60px rgba(150, 170, 240, 0.12);
      transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.4s ease;
    }
    .pill-btn:hover {
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 16px 44px rgba(0, 0, 0, 0.55), 0 0 80px rgba(150, 170, 240, 0.18);
    }
    .pill-btn:active { transform: scale(0.985); }

    .quiet {
      margin-top: 1.6rem;
      font-size: 0.78rem;
      color: rgba(235, 235, 235, 0.35);
    }
    .quiet a {
      color: rgba(235, 235, 235, 0.5);
      text-decoration: none;
      border-bottom: 1px solid rgba(235, 235, 235, 0.2);
      transition: color 0.3s ease;
    }
    .quiet a:hover { color: var(--ink-bright); }

    footer {
      position: fixed;
      left: 0; right: 0;
      bottom: max(1.1rem, env(safe-area-inset-bottom));
      text-align: center;
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: rgba(235, 235, 235, 0.28);
    }
    footer a { color: inherit; text-decoration: none; transition: color 0.3s ease; }
    footer a:hover { color: rgba(235, 235, 235, 0.6); }
    footer .sep { margin: 0 0.55em; }

    /* soft entrance */
    .js .rise {
      opacity: 0;
      transform: translateY(20px);
      filter: blur(8px);
      transition:
        opacity 1.3s ease,
        transform 1.3s cubic-bezier(0.2, 0.7, 0.2, 1),
        filter 1.3s ease;
    }
    .js .rise.d1 { transition-delay: 0.18s; }
    .js .rise.d2 { transition-delay: 0.36s; }
    .js .rise.d3 { transition-delay: 0.54s; }
    .js .in .rise { opacity: 1; transform: none; filter: blur(0); }

    @media (max-width: 640px) {
      .halo { width: 96vmin; height: 96vmin; }
      .drift i { filter: blur(34px); }
      .corner { top: 1.5rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .drift i, .halo .core { animation: none; }
      .js .rise { opacity: 1; transform: none; filter: none; transition: none; }
    }
  </style>
</head>
<body>

  <div class="drift" aria-hidden="true"><i class="a"></i><i class="b"></i><i class="c"></i></div>
  <div class="halo" aria-hidden="true"><div class="core"></div></div>

  <a class="corner brand" href="/">Rewire</a>
  <a class="corner contact" href="mailto:team@rewiremission.com">Contact</a>

  <main class="page">
    <p class="eyebrow rise">Affiliates</p>
    <h1 class="rise d1">Earn <em>quietly.</em></h1>
    <p class="sub rise d2"><span>An invite-only partnership for creators who move minds.</span></p>
    <a class="pill-btn rise d3" id="apply" href="mailto:team@rewiremission.com?subject=Affiliates&body=Hi%2C%0A%0AI%20want%20in.%0A%0AWhere%20I%20post%3A%0A">Contact us</a>
    <p class="quiet rise d3">Already inside? <a href="/dash">Open your dashboard</a></p>
  </main>

  <footer>
    <a href="/">Home</a><span class="sep">·</span><a href="/privacy">Privacy</a><span class="sep">·</span><a href="/terms">Terms</a><span class="sep">·</span><span>© 2026 Kramer Ventures GmbH</span>
  </footer>

  <script>
    (function () {
      // referral attribution: ?ref=<handle> lands in the email
      var ref = (new URLSearchParams(location.search).get('ref') || '')
        .toLowerCase().replace(/[^a-z0-9._]/g, '').slice(0, 32);
      if (ref) {
        var apply = document.getElementById('apply');
        apply.href += encodeURIComponent('\nReferred by: @' + ref + '\n');
      }
      setTimeout(function () { document.querySelector('.page').classList.add('in'); }, 160);
    })();
  </script>

</body>
</html>
