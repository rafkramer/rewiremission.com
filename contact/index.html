<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Rewire</title>
  <meta name="description" content="Get in touch with the Rewire team.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Playfair+Display:wght@400&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #f0f0f0;
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: rgba(255,255,255,0.15); color: #fff; }

    nav {
      padding: 2rem;
    }

    nav a {
      color: #444;
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }

    nav a:hover { color: #888; }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 4rem 2rem 8rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      margin-bottom: 0.8rem;
      letter-spacing: -0.02em;
    }

    .intro {
      font-size: 0.95rem;
      line-height: 1.8;
      color: #777;
      font-weight: 200;
      max-width: 460px;
      margin-bottom: 3rem;
    }

    .email-link {
      display: inline-block;
      color: #f0f0f0;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      padding: 1rem 2.5rem;
      border: 1px solid #333;
      transition: all 0.5s ease;
    }

    .email-link:hover {
      border-color: #666;
      background: rgba(255,255,255,0.03);
    }

    footer {
      padding: 3rem 2rem;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .footer-copy {
      font-size: 0.7rem;
      color: #333;
      font-weight: 200;
    }
  </style>
</head>
<body>

  <nav>
    <a href="/">← Rewire</a>
  </nav>

  <div class="container">
    <h1>Contact</h1>
    <p class="intro">Questions, press, partnerships, or anything else — reach the team directly. We read every message.</p>
    <a href="mailto:team@rewiremission.com" class="email-link">team@rewiremission.com</a>
  </div>

  <footer>
    <p class="footer-copy">&copy; 2025 Kramer Ventures GmbH. All rights reserved.</p>
  </footer>

</body>
</html>
